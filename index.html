<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Premier Site</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
    text-align:center;
    padding:40px;
}

.card{
    background:white;
    color:#111;
    max-width:500px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#1d4ed8;
}
</style>
</head>

<body>

<h1>🚀 Bienvenue sur mon premier site GitHub</h1>

<div class="card">
    <h2>Fait amusant 😂</h2>
    <p id="fact">
        Clique sur le bouton pour voir un fait amusant.
    </p>

    <button onclick="newFact()">
        Voir un fait
    </button>
<strong style="color:blue;">ARISTIDE229</strong>
</div>

<script>
const facts = [
"Les abeilles peuvent reconnaître les visages humains.",
"Le cœur d'une crevette est dans sa tête.",
"Les chats dorment environ 16 heures par jour.",
"Un poulpe possède 3 cœurs.",
"La Tour Eiffel grandit en été."
];

function newFact(){
    const random = Math.floor(Math.random()*facts.length);
    document.getElementById("fact").innerText = facts[random];
}
</script>

</body>
</html>
